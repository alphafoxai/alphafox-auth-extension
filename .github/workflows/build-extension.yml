name: Build Extension Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension assets
        run: pnpm run build

      - name: Package extension zip
        run: pnpm run zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphafox-auth-extension
          path: alphafox-auth-extension.zip
          if-no-files-found: error

      # Fixed tag "latest" so the download URL stays stable across pushes:
      # https://github.com/alphafoxai/alphafox-auth-extension/releases/latest/download/alphafox-auth-extension.zip
      - name: Publish latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest build
          prerelease: false
          makeLatest: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: alphafox-auth-extension.zip
          artifactContentType: application/zip
          body: |
            Automated Chrome extension build from `main`.

            - Commit: `${{ github.sha }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download `alphafox-auth-extension.zip`, unzip it, then load the folder in Chrome via `chrome://extensions` → Developer mode → Load unpacked.
